<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wallets analyzer</title>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body { font-family: Arial; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    svg {
      width: 55vw;
      height: 100vh;
      display: block;
      position: absolute;
      left: 0;
      top: 0;
      z-index: 0;   /* ✅ VERY IMPORTANT */
    }
    .link {
      stroke: #999;
      stroke-opacity: 0.6;
      marker-end: url(#arrow);
    }

    .node circle {
      stroke: #fff;
      stroke-width: 0.3px;
    }

    text {
      font-size: 12px;
    }
  </style>
</head>
<body>

<h3 style="position:absolute; z-index:10; background:white; padding:5px;"></h3>
<button onclick="resetZoom()" style="position:absolute; z-index:10;">
    Reset View
</button>
<button onclick="toggleLabels()" style="position:absolute; top:40px; z-index:10;">
  Toggle Labels
</button>
<div style="position:absolute; top:80px; left:10px; z-index:10; background:white; padding:10px;">
  <label>Min Amount:</label><br>
  <input type="number" id="amountInput" value="10" placeholder="Enter min sol amount">
  <br><br>
  <label>Min USD Amount:</label><br>
  <input type="number" id="usdInput" value="1000" placeholder="Enter min usd amount">
  
</div><div style="position:absolute; top:10px; left:100px; z-index:20; background:white; padding:10px;">
  <div>
    <label>Search Wallet:</label><br>
    <input type="text" id="searchBox">
    <button onclick="searchNode()">Search</button>
    <button onclick="expandNodeFromInput()">Expand Node</button>
  </div>
</div>

<div id="nodeInfo"
     style="position:absolute; top:10px; left:300px; z-index:10; 
            background:white; padding:10px; border:1px solid #ccc;">
  <b>Selected Node:</b><br>
  <span id="nodeValue">None</span>
</div>
  
<div id="walletTable"
     style="position:absolute; bottom:0; left:0; width:55%;
            background:white; border-top:1px solid #ccc;
            max-height:200px; overflow:auto; padding:10px; 
            z-index: 100; pointer-events: auto;">
</div>
<div id="sideTable"
     style="position:absolute; top:0; right:0; height:100vh;
            width:45%; max-width:50%; overflow:auto;
            background:white; border-left:1px solid #ccc;
            padding:10px; z-index:50;">
</div>
<div style="  position:absolute;  right:48%;  top:120px;  background:white;  padding:10px;  z-index:1000;  border:1px solid #ccc;">
  <b>Legend</b><br>
  🔵 TokenPair/CEX<br>
  🟢 program owned<br>
  🔴 wallet<br>
  ⚫ unknown<br>
  🟡 NA
</div>
<div id="graphContainer"
     style="position:absolute; left:0; top:0; width:55%; height:calc(100vh - 100px); z-index:0;">
  <svg style="width:100%; height:100%;"></svg>
</div>
<script>
let labelsVisible = false;
let hideAMM = false;
const csvUrl = "https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/refined_sol_addr.csv";
const HIGHLIGHT_COLOR = "darkblue";
const svg = d3.select("svg");
let allowedNodeSet = null;
let currentCenterNode = null;
const width = document.getElementById("graphContainer").clientWidth;
const height = window.innerHeight;

svg
  .attr("height", height)
  .style("position", "absolute")
  .style("left", "0px");



const container = svg.append("g");
  const zoom = d3.zoom()
  .scaleExtent([0.2, 5])  // min zoom, max zoom
  .on("zoom", (event) => {
    container.attr("transform", event.transform);
  });

svg.call(zoom).on("dblclick.zoom", null);

function resetZoom() {
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity
  );
}
function toggleLabels() {
  labelsVisible = !labelsVisible;

  // toggle node text visibility
  d3.selectAll(".node-label")
    .style("display", labelsVisible ? "block" : "none");
}

const defs = svg.append("defs");

// ✅ Gray arrow
defs.append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 -5 10 10")
  .attr("refY", 0)
  .attr("markerWidth", 5)
  .attr("markerHeight", 5)
  .attr("refX", 45)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "#777");

// ✅ Red arrow
defs.append("marker")
  .attr("id", "arrow-red")
  .attr("viewBox", "0 -5 10 10")
  .attr("refY", 0)
  .attr("markerWidth", 4)
  .attr("markerHeight", 4)
  .attr("refX", 45)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "red");

let simulation;
let rawData;
let walletData; // ✅ add global
let walletMap = {};
let cexSet = new Set(); 
let aggregatedData = [];
let extraGraphData = { nodes: [], links: [] };

// Load CSV from GitHub

Promise.all([
  d3.csv(csvUrl),
  d3.csv("https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/original_addr.csv"),
  d3.csv("https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/original_addr1.csv"),
  d3.csv("https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/cex_wallets.csv") ,
  d3.csv("https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/table_sol_addr.csv"),
  d3.csv("sol_addr.csv"),
  d3.csv("sol_addr1.csv"),
  d3.csv("sol_addr2.csv"),
  d3.csv("sol_addr3.csv"),
  d3.csv("sol_addr4.csv"),
  d3.csv("sol_addr5.csv")
]).then(([data, wData1, wData2, cexData,tableData, ...extraCSVs]) => {

  rawData = data;
  walletData = [...wData1, ...wData2];
  window.tableData = tableData;
  walletData.forEach(d => {
    if (d.Wallet) {
      walletMap[d.Wallet.trim()] = {
        owner: d.owner,
        sol: +String(d.SOL_Balance).replace(/,/g, "") || 0,
        usd: +String(d["USD Balance"]).replace(/,/g, "") || 0
      };
    }
  });
  
  cexData.forEach(d => {
    if (d.address) {
      cexSet.add(d.address.trim());
    }
  });
  // ✅ merge all CSVs
  aggregatedData = extraCSVs.flat();
  aggregatedData.forEach(d => {
    d.source = (d.source || "").trim();
    d.destination = (d.destination || "").trim();
    d.amount = +d.amount || 0;
  });


  // ✅ also keep the Set if you're using it
  window.walletSet = new Set(walletData.map(d => d.Wallet));

  const maxAmount = d3.max(rawData, d => +d.amount);
  const maxUsd = d3.max(rawData, d => +d.usdamount);

  updateGraph();
  buildSideTable();
  document.getElementById("amountInput").addEventListener("change", updateGraph);
  document.getElementById("usdInput").addEventListener("change", updateGraph);
  document.getElementById("searchBox")
    .addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        searchNode();
      }
  });
});

  ////////////////////////////////////////////////
function updateGraph() {
  if (!extraGraphData.nodes.length) {
    allowedNodeSet = null; // ✅ show full graph if no expansion
  }
  const minAmount = Math.max(0, +document.getElementById("amountInput").value || 0);
  const minUsd = Math.max(0, +document.getElementById("usdInput").value || 0);

  let nodesMap = {};
  let links = [];
  let usdLinks = [];
  container.selectAll("*").remove();
  rawData.forEach(d => {
    const source = d.source;
    const target = d.destination;
    
    if (allowedNodeSet) {
      const isAllowedEdge =
        allowedNodeSet.has(source) &&
        allowedNodeSet.has(target);
      
      const isDirectCenter =
        source === currentCenterNode ||
        target === currentCenterNode;
      
      if (!isAllowedEdge && !isDirectCenter) {
        return;
      }
    }

    const value = +d.amount;
    const usdValue = +d.usdamount;
  
    // ✅ normal links (amount)
    if (value && value >= minAmount) {
      nodesMap[source] = { id: source };
      nodesMap[target] = { id: target };
      links.push({
        source,
        target,
        value
      });
    }
    // ✅ USD links (only non-zero)
    if (usdValue && usdValue >= minUsd) {
      nodesMap[source] = { id: source };
      nodesMap[target] = { id: target };
      usdLinks.push({
        source,
        target,
        value: usdValue
      });
    }
  });
  
  // add extra nodes
  extraGraphData.nodes.forEach(n => {
    if (!nodesMap[n.id]) {
      nodesMap[n.id] = { id: n.id, extra: true };
    }
  });
  
  // add extra links (NORMAL links)
  extraGraphData.links.forEach(l => {
    links.push({
      source: l.source,
      target: l.target,
      value: l.value,
      extra: true
    });
  });

  const nodes = Object.values(nodesMap);
  if (nodes.length === 0) {
    console.warn("No nodes to display");
    return;
  }
  
simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink([...links, ...usdLinks]).id(d => d.id).distance(200).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-250))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("x", d3.forceX(width / 2).strength(0.05))
  .force("y", d3.forceY(height / 2).strength(0.05))
  .force("collision", d3.forceCollide().radius(d => getNodeSize(d.id) + 5))
simulation.alpha(1).restart();

  
  const link = container.append("g")
    .selectAll("line")
    .data(links)
    .enter().append("line")
    .attr("class", "link")
    .attr("stroke-width", d => {
      const w = Math.sqrt(d.value) / 5;
      return Math.max(1, Math.min(6, w));  // ✅ cap at 6
    });

  // 🔴 USD LINKS (RED)
  const usdLink = container.append("g")
    .selectAll("line.usd")
    .data(usdLinks)
    .enter().append("line")
    .attr("class", "usd")
    .attr("stroke", "red")
    .attr("stroke-opacity", 0.7)
    .attr("stroke-width", d => {
      const w = Math.sqrt(d.value) / 80;
      return Math.max(0.5, Math.min(4, w));  // ✅ cap at 4
    })
    .attr("marker-end", "url(#arrow-red)");
  
  const usdLabel = container.append("g")
    .selectAll(".usdLabel")
    .data(usdLinks)
    .enter()
    .append("text")
    .attr("class", "usdLabel")
    .text(d => Math.round(d.value / 100))
    .attr("fill", "red")
    .attr("font-size", 9)
    .attr("dy", -2);
  
  const edgeLabel = container.append("g")
    .selectAll("text")
    .data(links)
    .enter()
    .append("text")
    .text(d => Math.round(d.value).toLocaleString())
    .attr("font-size", 10);
  
  const node = container.append("g")
    .selectAll("g")
    .data(nodes)
    .enter().append("g")
    .attr("class", "node")
    .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended))
    .on("click", function(event, d) {
        document.getElementById("searchBox").value = d.id;
        showNodeInfo(d);      
        //buildExtraGraph(d.id);
       // reset all nodes to their category color
        resetNodeColors();
        // highlight selected node
        d3.select(this).select("circle")
          .attr("fill", HIGHLIGHT_COLOR);
    });

  node.append("circle")
    .attr("r", d => getNodeSize(d.id))
    .attr("fill", d => getNodeColor(d.id));

  node.append("text")
    .attr("x", 12)
    .attr("y", 3)
    .attr("class", "node-label")
    .style("display", "none")
    .text(d => {
      const id = d.id.toString();
      return id.length > 6 
        ? id.slice(0, 2) + "..." + id.slice(-2)
        : id;
    });



  simulation.on("tick", () => {
  
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
  
    usdLink
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    usdLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  
    edgeLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
  });
  applyAMMFilter();
  resetNodeColors();

}
///////////////////////////////////////////////////
window.addEventListener("resize", () => {
  const graphWidth = window.innerWidth * 0.55;  
  svg.attr("width", graphWidth);
  const newWidth = graphWidth;

  const newHeight = window.innerHeight;
  
    // Update SVG size
    svg.attr("width", newWidth)
       .attr("height", newHeight);
  
    if (!simulation) return;  // ✅ important

    // Update forces
    simulation
      .force("center", d3.forceCenter(graphWidth / 2, newHeight / 2))
      .force("x", d3.forceX(newWidth / 2).strength(0.05))
      .force("y", d3.forceY(newHeight / 2).strength(0.05));
  
    // Restart simulation
    simulation.alpha(1).restart();
  });
  ////////////////////////////////////////////////////////
function buildExtraGraph(centerId) {

  centerId = centerId.trim();
  currentCenterNode = centerId;
  // ✅ reset
  extraGraphData = { nodes: [], links: [] };

  let level1 = new Set();
  let level2 = new Set();

  // ✅ LEVEL 1
  const lvl1rows = [...aggregatedData, ...rawData].filter(d =>
    d.source === centerId || d.destination === centerId
  );

  lvl1rows.forEach(d => {

    const other = d.source === centerId ? d.destination : d.source;
    if (!other) return;

    level1.add(other);

    extraGraphData.links.push({
      source: centerId,
      target: other,
      value: d.amount,
      extra: true
    });
  });

  // ✅ LEVEL 2 (skip if level1 node is CEX)
  level1.forEach(l1Node => {
  
    const entry = walletMap[l1Node] || {};
    const owner = entry.owner || "";
  
    // ✅ 🚨 HARD STOP: do NOT expand from these
    if (cexSet.has(l1Node) || owner.startsWith("program_account")) {
      return;
    }
  
    const rows = [...aggregatedData, ...rawData].filter(d =>
      d.source === l1Node || d.destination === l1Node
    );
  
    rows.forEach(d => {
  
      const other = d.source === l1Node ? d.destination : d.source;
  
      if (!other || other === centerId) return;
  
      // ✅ 🚨 CRITICAL: only include if this node is not purely coming via CEX path
      level2.add(other);
  
      extraGraphData.links.push({
        source: l1Node,
        target: other,
        value: d.amount,
        extra: true
      });
  
    });
  });

  // ✅ combine all nodes
  extraGraphData.nodes = Array.from(new Set([
    centerId,
    ...level1,
    ...level2
  ])).map(id => ({ id }));
  // ✅ store allowed nodes for filtering
  allowedNodeSet = new Set([
    centerId,
    ...level1,
    ...level2
  ]);

  console.log("LEVEL1:", level1.size);
  console.log("LEVEL2:", level2.size);
  console.log("TOTAL LINKS:", extraGraphData.links.length);

  // ✅ redraw
  updateGraph();
}
  /////////////////////////////////////////////////////////////////////////////
function expandNodeFromInput() {
  const input = document.getElementById("searchBox").value.trim();
  if (!input) {
    alert("Please enter a wallet address");
    return;
  }
  // ✅ Check if node exists visually
  let found = false;
  d3.selectAll(".node").each(function(d) {
    if (d.id === input) {
      found = true;
    }
  });
  if (!found) {
    alert("Node not found in graph (may be filtered)");
    return;
  }
  // ✅ Expand graph (this was previously on node click)
  buildExtraGraph(input);
  // ✅ OPTIONAL: highlight + center (same UX as search)
  setTimeout(() => {
    searchNode(); // already applies highlight + zoom
  }, 100);
}
//////////////////////////////////////////////////////

    ///////////////////////////////////////////
let tableSortState = {}; // track sort direction
function buildSideTable() {
  const container = document.getElementById("sideTable");
  container.innerHTML = "";
  // ✅ STEP 1: Build lookup map (original file)
  if (!window.walletDetailsMap) {
    window.walletDetailsMap = {};
    walletData.forEach(d => {
      if (d.Wallet) {
        window.walletDetailsMap[d.Wallet.trim()] = d;
      }
    });
  }

  // ✅ STEP 2: Build wallet list from refined data
  const walletSet = new Set();

  rawData.forEach(d => {
    if (d.source) walletSet.add(d.source.trim());
    if (d.destination) walletSet.add(d.destination.trim());
  });

  // ✅ STEP 3: Merge refined wallets with original details
  // let data = Array.from(walletSet).map(id => {
  //   const details = window.walletDetailsMap[id];
  //   return {
  //     Wallet: id,
  //     ...(details || {}) // merge details if exists
  //   };
  // })
  let data = window.tableData.slice() 
  // ✅ STEP 4: Apply filters
  .filter(d => {

    const id = d.Wallet;

    // ❌ remove CEX
    if (cexSet.has(id)) return false;

    // ❌ must exist in original file
    if (!d.owner && !d.Owner) return false;

    const owner = (d.owner || d.Owner || "");

    // ❌ remove unknown owners
    if (owner.startsWith("NA")) return false;

    return true;
  });

  // ✅ save globally for sorting
  window.filteredWallets = data;

  if (!data.length) {
    container.innerHTML = "<b>No data available</b>";
    return;
  }

  // ✅ columns to hide
  const hiddenCols = new Set([
    "Wallet",
    "Token_Counterparties",
    "Net_SOL_Transfer",
    "SOL_In",
    "SOL_Balance",
    "USD_In",
    "USD Balance",
    "Gas_Paid_By_Others",
    "Gap_Top4_Hrs",
    "owner"
  ]);

  // ✅ visible columns
  const columns = Object.keys(data[0])
    .filter(c => !hiddenCols.has(c) && c !== "Wallet");
  const columnRenameMap = {
    "Age_Days":"Age",
    "Days_Active":"Active",
    "addr_nghbor":"nghbrs",
    "SOL_Counterparties": "sol_cp",
    "Tokens_Traded": "Tokens",
    "max_addresses": "maxAddr",
    "Gap_Others_Hrs": "Gap"
  };

  const table = document.createElement("table");
  table.style.width = "100%";
  table.style.borderCollapse = "collapse";

  // ✅ HEADER
  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");

  // ✅ Index column
  const indexTh = document.createElement("th");
  indexTh.innerText = "#";
  indexTh.style.border = "1px solid #ccc";
  indexTh.style.background = "#f2f2f2";
  indexTh.style.padding = "6px";
  indexTh.style.position = "sticky";
  indexTh.style.top = "0";
  indexTh.style.cursor = "pointer";

  headerRow.appendChild(indexTh)

  columns.forEach(col => {

    const th = document.createElement("th");
    th.innerText = columnRenameMap[col] || col;
    th.style.cursor = "pointer";
    th.style.border = "1px solid #ccc";
    th.style.background = "#f2f2f2";
    th.style.padding = "6px";
    th.style.position = "sticky";
    th.style.top = "0";
    th.style.zIndex = "100";
    th.style.pointerEvents = "auto";
    th.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopImmediatePropagation();   // ✅ stronger than stopPropagation
    
      console.log("HEADER CLICK:", col);  // debug
    
      sortTable(col, window.filteredWallets);
      buildSideTable();
    });

    headerRow.appendChild(th);
  });

  thead.appendChild(headerRow);
  table.appendChild(thead);

  // ✅ BODY
  const tbody = document.createElement("tbody");


  data.forEach((row, index) => {
  
    const tr = document.createElement("tr");
    
    // apply pointer ONLY for row hover
    tr.onmouseover = () => tr.style.cursor = "pointer";
    tr.onmouseout = () => tr.style.cursor = "default";
  
    // ✅ index cell
    const indexTd = document.createElement("td");
    indexTd.innerText = index + 1;
    indexTd.style.border = "1px solid #ddd";
    indexTd.style.padding = "5px";
  
    tr.appendChild(indexTd);

    tr.style.cursor = "default";
    
    tr.addEventListener("mouseenter", () => {
      tr.style.cursor = "pointer";
    });
    
    tr.addEventListener("mouseleave", () => {
      tr.style.cursor = "default";
    });

    tr.addEventListener("click", (e) => {
      // ✅ IGNORE clicks coming from header or its children
      if (e.target.tagName === "TH") return;
    
      if (row.Wallet) {
        focusNodeFromTable(row.Wallet);
      }
    });


    columns.forEach(col => {

      const td = document.createElement("td");
      td.innerText = row[col] ?? "";
      td.style.border = "1px solid #ddd";
      td.style.padding = "5px";

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

function sortTable(column, data) {

  const asc = tableSortState[column] !== true;
  tableSortState[column] = asc;

  data.sort((a, b) => {

    let valA = a[column];
    let valB = b[column];

    // try numeric compare
    const numA = parseFloat(valA);
    const numB = parseFloat(valB);

    if (!isNaN(numA) && !isNaN(numB)) {
      return asc ? numA - numB : numB - numA;
    }

    // string compare
    valA = String(valA);
    valB = String(valB);

    return asc
      ? valA.localeCompare(valB)
      : valB.localeCompare(valA);
  });
}
function focusNodeFromTable(walletId) {

  if (!walletId) return;

  const targetId = walletId.trim();

  let foundNode = null;
  let foundElement = null;

  d3.selectAll(".node")
    .each(function(d) {
      if (d.id === targetId) {
        foundNode = d;
        foundElement = this;
      }
    });

  if (!foundNode) {
    alert("Node not found in graph (maybe filtered out)" + walletId);
    return;
  }

  resetNodeColors();

  const circle = d3.select(foundElement).select("circle");

  circle
    .attr("stroke", "black")
    .attr("stroke-width", 3)
    .attr("fill", HIGHLIGHT_COLOR);
  const scale = 1.5;

  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity
      .translate(width / 2, height / 2)
      .scale(scale)
      .translate(-foundNode.x, -foundNode.y)
  );

  showNodeInfo(foundNode);
}
////////////////////////////////////////////////////
function resetNodeColors() {
  d3.selectAll(".node circle")
    .each(function(d) {
      if (!d || !d.id) return;
      d3.select(this).attr("fill", getNodeColor(d.id));
    });
}
  ////////////////////////////////////
function toggleAMM() {

  hideAMM = !hideAMM;

  const btn = document.getElementById("ammBtn");
  btn.innerText = hideAMM ? "Show Token Pairs" : "Hide Token Pairs";

  applyAMMFilter();

  // ✅ restore correct colors after filtering
  resetNodeColors();
}
  
function applyAMMFilter() {

  d3.selectAll(".node")
    .style("display", function(d) {

      const entry = walletMap[d.id];
      const owner = entry?.owner || "";

      const isAMM = owner.startsWith("program_accountpAMM");

      return (hideAMM && isAMM) ? "none" : "block";
    });

  d3.selectAll("line")
    .style("display", function(d) {

      const srcOwner = walletMap[d.source.id]?.owner || "";
      const dstOwner = walletMap[d.target.id]?.owner || "";

      const isAMM =
        srcOwner.startsWith("program_accountpAMM") ||
        dstOwner.startsWith("program_accountpAMM");

      return (hideAMM && isAMM) ? "none" : "block";
    });

  d3.selectAll("line.usd")
    .style("display", function(d) {

      const srcOwner = walletMap[d.source.id]?.owner || "";
      const dstOwner = walletMap[d.target.id]?.owner || "";

      const isAMM =
        srcOwner.startsWith("program_accountpAMM") ||
        dstOwner.startsWith("program_accountpAMM");

      return (hideAMM && isAMM) ? "none" : "block";
    });
}

  
function getNodeColor(walletId) {
  const entry = walletMap[walletId.trim()];
  const id = walletId.trim();
  if (cexSet.has(id)) return "lightblue";
  if (!entry) return "#FFD700";
  const owner = entry.owner || "";   // ✅ FIX
  if (owner.startsWith("program_accountpAMM")) return "blue";
  if (owner.startsWith("program_account")) return "green";
  if (owner.startsWith("wallet")) return "red";
  if (owner.startsWith("unknown")) return "black";
  return "#FFD700";
}

function getNodeSize(walletId) {
  const entry = walletMap[walletId.trim()];
  if (!entry) return 6; // default radius
  const sol = entry.sol || 0;
  const usd = entry.usd || 0;
  const value = sol + (usd / 100);
  // ✅ scale it (important!)
  return Math.max(5, Math.min(25, Math.sqrt(value)));
}

// Drag
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}
  
function searchNode() {

  const input = document.getElementById("searchBox").value
    .trim();

  if (!input) return;

  let foundNode = null;
  let foundElement = null;

  d3.selectAll("g")
    .each(function(d) {
      if (d && d.id && d.id === input) {
        foundNode = d;
        foundElement = this; // ✅ store element
      }
    });

  if (!foundNode) {
    alert("Node not found");
    return;
  }

  // ✅ reset colors
  resetNodeColors();
  
const circle = d3.select(foundElement).select("circle");

const baseSize = getNodeSize(foundNode.id);

// ✅ RESET FIRST (important)
circle
  .attr("stroke", "none")
  .attr("stroke-width", 1)
  .attr("fill", getNodeColor(foundNode.id));

// ✅ ✅ GLOW EFFECT
circle
  .attr("stroke", "black")
  .attr("stroke-width", 3);

// ✅ ✅ COLOR FLASH + SIZE PULSE
circle
  .transition()
  .duration(200)
  .attr("fill", HIGHLIGHT_COLOR)
  .attr("r", baseSize * 2)

  .transition()
  .duration(200)
  .attr("fill", "red")
  .attr("r", baseSize)

  .transition()
  .duration(200)
  .attr("fill", HIGHLIGHT_COLOR)
  .attr("r", baseSize * 1.5)

  .transition()
  .duration(200)
  .attr("r", baseSize);

  const scale = 1.5;
  const x = foundNode.x;
  const y = foundNode.y;
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity
      .translate(width / 2, height / 2)
      .scale(scale)
      .translate(-x, -y)
  );

  showNodeInfo(foundNode);
}


function showNodeInfo(d) {
  document.getElementById("nodeValue").innerText = d.id;
  // ✅ find matching row in walletData
  const row = walletData.find(w => 
    w.Wallet && w.Wallet.trim() === d.id.trim()
  );
  const container = document.getElementById("walletTable");
  // ✅ clear previous table
  container.innerHTML = "";
  if (!row) {
    container.innerHTML = "<b>No data found for this wallet</b>";
    return;
  }
  // ✅ create table
  const table = document.createElement("table");
  table.style.borderCollapse = "collapse";
  table.style.width = "100%";

  const headerRow = document.createElement("tr");
  const valueRow = document.createElement("tr");

  // ✅ generate headers + values
  Object.keys(row).forEach(key => {

    const th = document.createElement("th");
    th.innerText = key;
    th.style.border = "1px solid #ccc";
    th.style.padding = "5px";
    th.style.background = "#f2f2f2";

    const td = document.createElement("td");
    td.innerText = row[key];
    td.style.border = "1px solid #ccc";
    td.style.padding = "5px";

    headerRow.appendChild(th);
    valueRow.appendChild(td);
  });
  table.appendChild(headerRow);
  table.appendChild(valueRow);
  container.appendChild(table);
  // ✅ optional clipboard
  try {
    navigator.clipboard.writeText(d.id);
  } catch (e) {}
}
