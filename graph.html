<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graph from GitHub CSV</title>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body { font-family: Arial; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .link {
      stroke: #999;
      stroke-opacity: 0.6;
      marker-end: url(#arrow);
    }

    .node circle {
      fill: #69b3a2;
      stroke: #fff;
      stroke-width: 1.5px;
    }

    text {
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h3 style="position:absolute; z-index:10; background:white; padding:5px;">Directed Graph (Live from GitHub CSV)</h3>
  <button onclick="resetZoom()" style="position:absolute; z-index:10;">
    Reset View
  </button>
  <button onclick="toggleLabels()" style="position:absolute; top:40px; z-index:10;">
  Toggle Labels
</button>

<svg></svg>

<script>
let labelsVisible = true;

const csvUrl = "https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/sol_addr.csv";

const svg = d3.select("svg"),
      width = window.innerWidth,
      height = window.innerHeight;

const container = svg.append("g");
  const zoom = d3.zoom()
  .scaleExtent([0.2, 5])  // min zoom, max zoom
  .on("zoom", (event) => {
    container.attr("transform", event.transform);
  });

svg.call(zoom).on("dblclick.zoom", null);

function resetZoom() {
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity
  );
}
function toggleLabels() {
  labelsVisible = !labelsVisible;

  // toggle node text visibility
  d3.selectAll(".node-label")
    .style("display", labelsVisible ? "block" : "none");
}

const defs = svg.append("defs");

// ✅ Gray arrow
defs.append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 15)
  .attr("refY", 0)
  .attr("markerWidth", 6)
  .attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "#777");

// ✅ Red arrow
defs.append("marker")
  .attr("id", "arrow-red")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 15)   // ✅ align with link end
  .attr("refY", 0)
  .attr("markerWidth", 5)
  .attr("markerHeight", 5)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "red");

let simulation;

// Load CSV from GitHub
d3.csv(csvUrl).then(data => {

let nodesMap = {};
let links = [];
let usdLinks = [];
data.forEach(d => {

  const source = d.source;
  const target = d.destination;
  const value = +d.amount;
  const usdValue = +d.usdamount;

  // ✅ normal links (amount)
  if (value && value !== 0) {
    nodesMap[source] = { id: source };
    nodesMap[target] = { id: target };

    links.push({
      source,
      target,
      value
    });
  }

  // ✅ USD links (only non-zero)
  if (usdValue && usdValue > 0) {
    nodesMap[source] = { id: source };
    nodesMap[target] = { id: target };

    usdLinks.push({
      source,
      target,
      value: usdValue
    });
  }

});

const nodes = Object.values(nodesMap);

simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink([...links, ...usdLinks]).id(d => d.id).distance(100).strength(0.8))
  .force("charge", d3.forceManyBody().strength(-150))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("x", d3.forceX(width / 2).strength(0.05))
  .force("y", d3.forceY(height / 2).strength(0.05))
  .force("collision", d3.forceCollide().radius(20));

  window.addEventListener("resize", () => {
    const newWidth = window.innerWidth;
    const newHeight = window.innerHeight;
  
    // Update SVG size
    svg.attr("width", newWidth)
       .attr("height", newHeight);
  
    // Update forces
    simulation
      .force("center", d3.forceCenter(newWidth / 2, newHeight / 2))
      .force("x", d3.forceX(newWidth / 2).strength(0.05))
      .force("y", d3.forceY(newHeight / 2).strength(0.05));
  
    // Restart simulation
    simulation.alpha(0.5).restart();
  });
  
  const link = container.append("g")
    .selectAll("line")
    .data(links)
    .enter().append("line")
    .attr("class", "link")
    .attr("stroke-width", d => Math.max(1, Math.sqrt(d.value) / 5));

  // 🔴 USD LINKS (RED)
  const usdLink = container.append("g")
    .selectAll("line.usd")
    .data(usdLinks)
    .enter().append("line")
    .attr("class", "usd")
    .attr("stroke", "red")
    .attr("stroke-opacity", 0.7)
    .attr("stroke-width", d => Math.max(0.5, Math.sqrt(d.value) / 80))
    .attr("marker-end", "url(#arrow-red)");
  
  const node = container.append("g")
    .selectAll("g")
    .data(nodes)
    .enter().append("g")
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended));

  node.append("circle")
    .attr("r", 8);


node.append("text")
  .attr("x", 12)
  .attr("y", 3)
  .attr("class", "node-label")
  .text(d => {
    const id = d.id.toString();
    return id.length > 6 
      ? id.slice(0, 2) + "..." + id.slice(-2)
      : id;
  });



  const usdLabel = container.append("g")
    .selectAll(".usdLabel")
    .data(usdLinks)
    .enter()
    .append("text")
    .attr("class", "usdLabel")
    .text(d => Math.round(d.value / 100))
    .attr("fill", "red")
    .attr("font-size", 9)
    .attr("dy", -2);
  
  const edgeLabel = container.append("g")
    .selectAll("text")
    .data(links)
    .enter()
    .append("text")
    .text(d => Math.round(d.value).toLocaleString())
    .attr("font-size", 10);

  simulation.on("tick", () => {
  
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
  
    usdLink
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    usdLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  
    edgeLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
  });

});

// Drag
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

</script>

</body>
</html>
