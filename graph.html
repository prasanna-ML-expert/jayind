<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wallets analyzer</title>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body { font-family: Arial; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .link {
      stroke: #999;
      stroke-opacity: 0.6;
      marker-end: url(#arrow);
    }

    .node circle {
      fill: #69b3a2;
      stroke: #fff;
      stroke-width: 1.5px;
    }

    text {
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h3 style="position:absolute; z-index:10; background:white; padding:5px;"></h3>
<button onclick="resetZoom()" style="position:absolute; z-index:10;">
    Reset View
</button>
<button onclick="toggleLabels()" style="position:absolute; top:40px; z-index:10;">
  Toggle Labels
</button>
<div style="position:absolute; top:80px; left:10px; z-index:10; background:white; padding:10px;">
  <label>Min Amount:</label><br>
  <input type="number" id="amountInput" value="10" placeholder="Enter min sol amount">
  <br><br>
  <label>Min USD Amount:</label><br>
  <input type="number" id="usdInput" value="1000" placeholder="Enter min usd amount">
</div>
<div style="position:absolute; top:50px; right:10px; z-index:10; background:white; padding:10px;">
  <label>Search Wallet:</label><br>
  <input type="text" id="searchBox" placeholder="Enter address">
  <button onclick="searchNode()">Search</button>
</div>

<div id="nodeInfo"
     style="position:absolute; top:10px; right:10px; z-index:10; 
            background:white; padding:10px; border:1px solid #ccc;">
  <b>Selected Node:</b><br>
  <span id="nodeValue">None</span>
</div>
<div id="walletTable"
     style="position:absolute; bottom:0; left:0; width:100%; 
            background:white; border-top:1px solid #ccc; 
            max-height:200px; overflow:auto; padding:10px;">
</div>
<div style="position:absolute; right:10px; top:120px; background:white; padding:10px;">
  <b>Legend</b><br>
  🔵 TokenPair<br>
  🟢 program owned<br>
  🔴 wallet<br>
  ⚫ unknown<br>
  🟡 NA
</div>
<svg></svg>

<script>
let labelsVisible = false;

const csvUrl = "https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/sol_addr.csv";

const svg = d3.select("svg"),
      width = window.innerWidth,
      height = window.innerHeight;

const container = svg.append("g");
  const zoom = d3.zoom()
  .scaleExtent([0.2, 5])  // min zoom, max zoom
  .on("zoom", (event) => {
    container.attr("transform", event.transform);
  });

svg.call(zoom).on("dblclick.zoom", null);

function resetZoom() {
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity
  );
}
function toggleLabels() {
  labelsVisible = !labelsVisible;

  // toggle node text visibility
  d3.selectAll(".node-label")
    .style("display", labelsVisible ? "block" : "none");
}

const defs = svg.append("defs");

// ✅ Gray arrow
defs.append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 15)
  .attr("refY", 0)
  .attr("markerWidth", 5)
  .attr("markerHeight", 5)
  .attr("refX", 12)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "#777");

// ✅ Red arrow
defs.append("marker")
  .attr("id", "arrow-red")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 15)   // ✅ align with link end
  .attr("refY", 0)
  .attr("markerWidth", 4)
  .attr("markerHeight", 4)
  .attr("refX", 10)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "red");

let simulation;
let rawData;
let walletData; // ✅ add global
let walletMap = {};
// Load CSV from GitHub

Promise.all([
  d3.csv(csvUrl),
  d3.csv("https://raw.githubusercontent.com/prasanna-ML-expert/jayind/main/original_addr.csv")
]).then(([data, wData]) => {

  rawData = data;
  walletData = wData;   // ✅ store full dataset
  walletData.forEach(d => {
    if (d.Wallet) {
      walletMap[d.Wallet.trim().toLowerCase()] = {
        owner: d.owner,
        sol: +String(d.SOL_Balance).replace(/,/g, "") || 0,
        usd: +String(d["USD Balance"]).replace(/,/g, "") || 0
      };
    }
  });
  // ✅ also keep the Set if you're using it
  window.walletSet = new Set(wData.map(d => d.Wallet));

  const maxAmount = d3.max(rawData, d => +d.amount);
  const maxUsd = d3.max(rawData, d => +d.usdamount);

  updateGraph();
  document.getElementById("amountInput").addEventListener("change", updateGraph);
  document.getElementById("usdInput").addEventListener("change", updateGraph);
  document.getElementById("searchBox")
    .addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        searchNode();
      }
  });
});

  
function updateGraph() {

const minAmount = Math.max(0, +document.getElementById("amountInput").value || 0);
const minUsd = Math.max(0, +document.getElementById("usdInput").value || 0);

let nodesMap = {};
let links = [];
let usdLinks = [];
container.selectAll("*").remove();
rawData.forEach(d => {

  const source = d.source;
  const target = d.destination;
  const value = +d.amount;
  const usdValue = +d.usdamount;

  // ✅ normal links (amount)
  if (value && value >= minAmount) {
    nodesMap[source] = { id: source };
    nodesMap[target] = { id: target };

    links.push({
      source,
      target,
      value
    });
  }

  // ✅ USD links (only non-zero)
  if (usdValue && usdValue >= minUsd) {
    nodesMap[source] = { id: source };
    nodesMap[target] = { id: target };

    usdLinks.push({
      source,
      target,
      value: usdValue
    });
  }

});

const nodes = Object.values(nodesMap);

if (nodes.length === 0) {
  console.warn("No nodes to display");
  return;
}

simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink([...links, ...usdLinks]).id(d => d.id).distance(200).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-250))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("x", d3.forceX(width / 2).strength(0.05))
  .force("y", d3.forceY(height / 2).strength(0.05))
  .force("collision", d3.forceCollide().radius(d => getNodeSize(d.id) + 5))
simulation.alpha(1).restart();


  
  const link = container.append("g")
    .selectAll("line")
    .data(links)
    .enter().append("line")
    .attr("class", "link")
    .attr("stroke-width", d => {
      const w = Math.sqrt(d.value) / 5;
      return Math.max(1, Math.min(6, w));  // ✅ cap at 6
    });

  // 🔴 USD LINKS (RED)
  const usdLink = container.append("g")
    .selectAll("line.usd")
    .data(usdLinks)
    .enter().append("line")
    .attr("class", "usd")
    .attr("stroke", "red")
    .attr("stroke-opacity", 0.7)
    .attr("stroke-width", d => {
      const w = Math.sqrt(d.value) / 80;
      return Math.max(0.5, Math.min(4, w));  // ✅ cap at 4
    })
    .attr("marker-end", "url(#arrow-red)");
  
  const node = container.append("g")
    .selectAll("g")
    .data(nodes)
    .enter().append("g")
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended))
    .on("click", function(event, d) {
        showNodeInfo(d);      
        const entry = walletMap[d.id.trim().toLowerCase()];
        if (entry) {
          const value = (entry.sol || 0) + ((entry.usd || 0) / 100);
          console.log("Node:", d.id);
          console.log("SOL:", entry.sol, "USD:", entry.usd);
          console.log("Computed value:", value);
          console.log("Final radius:", getNodeSize(d.id));
        } else {
          console.log("Node:", d.id, "→ No wallet data");
        }

       // reset all nodes to their category color
        d3.selectAll("circle")
          .attr("fill", d2 => getNodeColor(d2.id));
        // highlight selected node
        d3.select(this).select("circle")
          .attr("fill", "orange");
      });

  node.append("circle")
    .attr("r", d => getNodeSize(d.id))
    .attr("fill", d => getNodeColor(d.id));

  node.append("text")
    .attr("x", 12)
    .attr("y", 3)
    .attr("class", "node-label")
    .style("display", "none")
    .text(d => {
      const id = d.id.toString();
      return id.length > 6 
        ? id.slice(0, 2) + "..." + id.slice(-2)
        : id;
    });

  const usdLabel = container.append("g")
    .selectAll(".usdLabel")
    .data(usdLinks)
    .enter()
    .append("text")
    .attr("class", "usdLabel")
    .text(d => Math.round(d.value / 100))
    .attr("fill", "red")
    .attr("font-size", 9)
    .attr("dy", -2);
  
  const edgeLabel = container.append("g")
    .selectAll("text")
    .data(links)
    .enter()
    .append("text")
    .text(d => Math.round(d.value).toLocaleString())
    .attr("font-size", 10);

  simulation.on("tick", () => {
  
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
  
    usdLink
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    usdLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  
    edgeLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
  });

}

window.addEventListener("resize", () => {
    const newWidth = window.innerWidth;
    const newHeight = window.innerHeight;
  
    // Update SVG size
    svg.attr("width", newWidth)
       .attr("height", newHeight);
  
    if (!simulation) return;  // ✅ important

    // Update forces
    simulation
      .force("center", d3.forceCenter(newWidth / 2, newHeight / 2))
      .force("x", d3.forceX(newWidth / 2).strength(0.05))
      .force("y", d3.forceY(newHeight / 2).strength(0.05));
  
    // Restart simulation
    simulation.alpha(1).restart();
  });

function getNodeColor(walletId) {
  const entry = walletMap[walletId.trim().toLowerCase()];
  if (!entry) return "#FFD700";
  const owner = entry.owner || "";   // ✅ FIX
  if (owner.startsWith("program_accountpAMM")) return "blue";
  if (owner.startsWith("program_account")) return "green";
  if (owner.startsWith("wallet")) return "red";
  if (owner.startsWith("unknown")) return "black";
  return "#FFD700";
}

function getNodeSize(walletId) {
  const entry = walletMap[walletId.trim().toLowerCase()];
  if (!entry) return 6; // default radius
  const sol = entry.sol || 0;
  const usd = entry.usd || 0;
  const value = sol + (usd / 100);
  // ✅ scale it (important!)
  return Math.max(5, Math.min(25, Math.sqrt(value)));
}

// Drag
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}
  
function searchNode() {

  const input = document.getElementById("searchBox").value
    .trim()
    .toLowerCase();

  if (!input) return;

  let foundNode = null;
  let foundElement = null;

  d3.selectAll("g")
    .each(function(d) {
      if (d && d.id && d.id.toLowerCase() === input) {
        foundNode = d;
        foundElement = this; // ✅ store element
      }
    });

  if (!foundNode) {
    alert("Node not found");
    return;
  }

  // ✅ reset colors
  d3.selectAll("circle")
    .attr("fill", d2 => getNodeColor(d2.id));

  
const circle = d3.select(foundElement).select("circle");

const baseSize = getNodeSize(foundNode.id);

// ✅ RESET FIRST (important)
circle
  .attr("stroke", "none")
  .attr("stroke-width", 1)
  .attr("fill", getNodeColor(foundNode.id));

// ✅ ✅ GLOW EFFECT
circle
  .attr("stroke", "black")
  .attr("stroke-width", 3);

// ✅ ✅ COLOR FLASH + SIZE PULSE
circle
  .transition()
  .duration(200)
  .attr("fill", "orange")
  .attr("r", baseSize * 2)

  .transition()
  .duration(200)
  .attr("fill", "red")
  .attr("r", baseSize)

  .transition()
  .duration(200)
  .attr("fill", "yellow")
  .attr("r", baseSize * 1.5)

  .transition()
  .duration(200)
  .attr("r", baseSize);

  const scale = 1.5;
  const x = foundNode.x;
  const y = foundNode.y;
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity
      .translate(width / 2, height / 2)
      .scale(scale)
      .translate(-x, -y)
  );

  showNodeInfo(foundNode);
}


function showNodeInfo(d) {
  document.getElementById("nodeValue").innerText = d.id;
  // ✅ find matching row in walletData
  const row = walletData.find(w => 
    w.Wallet && w.Wallet.trim().toLowerCase() === d.id.trim().toLowerCase()
  );
  const container = document.getElementById("walletTable");
  // ✅ clear previous table
  container.innerHTML = "";
  if (!row) {
    container.innerHTML = "<b>No data found for this wallet</b>";
    return;
  }
  // ✅ create table
  const table = document.createElement("table");
  table.style.borderCollapse = "collapse";
  table.style.width = "100%";

  const headerRow = document.createElement("tr");
  const valueRow = document.createElement("tr");

  // ✅ generate headers + values
  Object.keys(row).forEach(key => {

    const th = document.createElement("th");
    th.innerText = key;
    th.style.border = "1px solid #ccc";
    th.style.padding = "5px";
    th.style.background = "#f2f2f2";

    const td = document.createElement("td");
    td.innerText = row[key];
    td.style.border = "1px solid #ccc";
    td.style.padding = "5px";

    headerRow.appendChild(th);
    valueRow.appendChild(td);
  });
  table.appendChild(headerRow);
  table.appendChild(valueRow);
  container.appendChild(table);
  // ✅ optional clipboard
  try {
    navigator.clipboard.writeText(d.id);
  } catch (e) {}
}

</script>

</body>
</html>
